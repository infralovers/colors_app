name: Infralovers Container Build

on:
  workflow_dispatch:

  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  build:
    uses: infralovers/.github/.github/workflows/container.yml@main
    with:
      dockerfile: Dockerfile
      platforms: "linux/amd64, linux/arm64"
      release: true
